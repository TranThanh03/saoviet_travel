<!DOCTYPE html>
<html lang="vn">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%PUBLIC_URL%/logo.jpg" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sao Việt - Vivu ba miền</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
        <script src="//cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <script>
            (function () {
                const isAdmin = window.location.pathname.includes("manage");

                const cssFilesUser = [
                    "/user/css/style.css",
                    "/user/css/fontawesome-5.14.0.min.css",
                    "/user/css/slick.min.css",
                    "/user/css/flaticon.min.css"
                ];

                const cssFilesAdmin = [
                    "/admin/css/custom-css.css",
                    "/admin/css/custom.css"
                ];

                const list = isAdmin ? cssFilesAdmin : cssFilesUser;

                list.forEach(href => {
                    const link = document.createElement("link");
                    link.rel = "stylesheet";
                    link.href = href;
                    document.head.appendChild(link);
                });
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
