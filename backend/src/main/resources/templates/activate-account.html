<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kích hoạt tài khoản</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f9fafb;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }
        h2 {
            color: #007bff;
        }
        a.button {
            display: inline-block;
            background: #007bff;
            color: #fff !important;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Chào bạn,</h2>
    <p>Cảm ơn bạn đã đăng ký tài khoản tại <b>Sao Việt</b>.</p>
    <p>Vui lòng nhấn vào nút bên dưới để kích hoạt tài khoản của bạn:</p>

    <div style="text-align: center;">
        <a th:href="${activationLink}" class="button">Kích hoạt tài khoản</a>
    </div>

    <p>Nếu bạn không thực hiện đăng ký, vui lòng bỏ qua email này.</p>

    <hr style="margin-top: 40px; border: none; border-top: 1px solid #ccc;" />
    <footer style="text-align: center; font-size: 13px; color: #777; margin-top: 20px;">
        <p style="margin: 5px 0;"><b>Sao Việt</b> – Vivu ba miền</p>
        <p style="margin: 5px 0;">
            🌐 <a th:href="${feBaseUrl}" th:text="${website}" style="color: #007bff; text-decoration: none;"></a>
        </p>
        <p style="margin-top: 10px; font-size: 12px; color: #aaa;">
            Email này được gửi tự động. Vui lòng không trả lời lại.
        </p>
    </footer>
</div>
</body>
</html>
